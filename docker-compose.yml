services:
  app:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: lab1_app
    environment:
      - DATABASE_URL=postgresql://app_user:app_password@db:5432/app_db
    ports:
      - "8000:8000"
    depends_on:
      - db
    networks:
      - app_network

  db:
    build:
      context: ./db
      dockerfile: Dockerfile
    container_name: lab1_db
    environment:
      - POSTGRES_USER=app_user
      - POSTGRES_PASSWORD=app_password
      - POSTGRES_DB=app_db
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - app_network

networks:
  app_network:
    driver: bridge

volumes:
  db_data:
    driver: local

